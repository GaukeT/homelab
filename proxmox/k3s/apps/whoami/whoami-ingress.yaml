apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami
  namespace: whoami
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`whoami.devnord.duckdns.org`)
      services:
        - name: whoami
          port: 80
  tls:
    certResolver: letsencrypt
