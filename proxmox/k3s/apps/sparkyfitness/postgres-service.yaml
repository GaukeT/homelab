apiVersion: v1
kind: Service
metadata:
  # Must be named "sparkyfitness-postgresql" — this is what the helm chart's
  # databaseHost helper resolves to when postgresql.enabled=true
  name: sparkyfitness-postgresql
  namespace: sparkyfitness
  labels:
    app.kubernetes.io/name: sparkyfitness
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sparkyfitness
    app.kubernetes.io/component: postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP

