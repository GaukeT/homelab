services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: always
    ports:
      # - "80:80"       # HTTP
      - "443:443"     # HTTPS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./letsencrypt:/letsencrypt
    env_file:
      - .env      
    networks:
      - web

networks:
  web:

