# log:
#   level: DEBUG  # options: ERROR, WARN, INFO, DEBUG
#   format: common  # or json

# accessLog: {}

api:
  dashboard: true
  insecure: false

entryPoints:
  websecure:
    address: ":443"
  metrics:
    address: ":9091"

providers:
  docker:
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

metrics:
  prometheus: 
    entryPoint: metrics

certificatesResolvers:
  duckdns:
    acme:
      email: "${ACME_EMAIL}"
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: duckdns
        delayBeforeCheck: 30
